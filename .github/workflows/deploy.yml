name: Deploy Frontend to VM

on:
  # workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1085023765253/locations/global/workloadIdentityPools/github-pool/providers/github-actions'
          service_account: 'github-deploy-sa@clinicqa-500817.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: 'clinicqa-500817'

      - name: Configure Docker to use Artifact Registry
        run: |
          gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build and Push Admin Web
        run: |
          cd admin-web
          docker build -t asia-southeast1-docker.pkg.dev/clinicqa-500817/clinic-artifact/admin-web:${{ github.sha }} .
          docker tag asia-southeast1-docker.pkg.dev/clinicqa-500817/clinic-artifact/admin-web:${{ github.sha }} asia-southeast1-docker.pkg.dev/clinicqa-500817/clinic-artifact/admin-web:latest
          docker push asia-southeast1-docker.pkg.dev/clinicqa-500817/clinic-artifact/admin-web:${{ github.sha }}
          docker push asia-southeast1-docker.pkg.dev/clinicqa-500817/clinic-artifact/admin-web:latest

      - name: Build and Push Patient Web
        run: |
          cd patient-web
          docker build -t asia-southeast1-docker.pkg.dev/clinicqa-500817/clinic-artifact/patient-web:${{ github.sha }} .
          docker tag asia-southeast1-docker.pkg.dev/clinicqa-500817/clinic-artifact/patient-web:${{ github.sha }} asia-southeast1-docker.pkg.dev/clinicqa-500817/clinic-artifact/patient-web:latest
          docker push asia-southeast1-docker.pkg.dev/clinicqa-500817/clinic-artifact/patient-web:${{ github.sha }}
          docker push asia-southeast1-docker.pkg.dev/clinicqa-500817/clinic-artifact/patient-web:latest

      - name: Deploy to VM via IAP SSH
        run: |
          gcloud compute ssh clinic-vm --zone "asia-southeast1-a" --tunnel-through-iap --project "clinicqa-500817" --command "
            # Install Docker if not exists
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker \$USER
            fi
            
            # Initialize Swarm if not active
            if ! sudo docker info --format '{{.Swarm.LocalNodeState}}' | grep -qw 'active'; then
              echo 'Initializing Docker Swarm...'
              sudo docker swarm init || true
            fi
            
            # Update frontend services dynamically in Swarm
            echo 'Updating Admin Web...'
            sudo docker service update --image asia-southeast1-docker.pkg.dev/clinicqa-500817/clinic-artifact/admin-web:${{ github.sha }} clinic_admin-web
            
            echo 'Updating Patient Web...'
            sudo docker service update --image asia-southeast1-docker.pkg.dev/clinicqa-500817/clinic-artifact/patient-web:${{ github.sha }} clinic_patient-web
            
            # Force Nginx Proxy to restart to reload configs if needed
            echo 'Restarting Nginx Proxy...'
            sudo docker service update --force clinic_nginx-proxy
          "
