name: clinic_management_system
description: A new Flutter project for clinic management.

publish_to: "none" # Remove this line if you want to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Add other dependencies here
  cupertino_icons: ^1.0.2
  google_fonts: ^8.0.2
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.1
  shimmer: ^3.0.0
  flutter_dotenv: ^5.1.0
  easy_localization: ^3.0.3
  intl: ^0.20.2
  image_picker: ^1.2.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/translations/
    - .env
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_square.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
